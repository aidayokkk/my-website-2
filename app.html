<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cafe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="logo">cafe</div>
    <nav class="nav">menu</nav>
  </header>

  <main class="main-container">
    
    <aside class="sidebar">
      <div class="sidebar-content">
        <h1 class="title">cafe menu</h1>
        <div class="divider"></div>
        <p class="description">ゆったり、ほっとできる<br>時間をお届けします。</p>
      </div>
    </aside>

    <section class="menu-section">
      
      <div class="filter-buttons">
        <button type="button" class="mixitup-control-active" data-filter=".food">food</button>
        <button type="button" data-filter=".drink">drink</button>
      </div>

      <div class="line"></div>

      <div class="menu-container">

        <div class="mix food menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">strawberry cake</h2>
            <p class="item-desc">いちごのショートケーキ。</p>
          </div>
          <div class="item-price">¥ 750</div>
        </div>

        <div class="mix food menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">cheesecake</h2>
            <p class="item-desc">ベイクドチーズケーキ</p>
          </div>
          <div class="item-price">¥ 700</div>
        </div>

        <div class="mix food menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">chocolate cake</h2>
            <p class="item-desc">チョコレートケーキ</p>
          </div>
          <div class="item-price">¥ 750</div>
        </div>

        <div class="mix food menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">lemon cake</h2>
            <p class="item-desc">レモンケーキ</p>
          </div>
          <div class="item-price">¥ 680</div>
        </div>

        <div class="mix food menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">berry tart</h2>
            <p class="item-desc">ベリータルト。</p>
          </div>
          <div class="item-price">¥ 800</div>
        </div>

        <div class="mix drink menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">blend coffee</h2>
            <p class="item-desc">深みのある香りとコク。</p>
          </div>
          <div class="item-price">¥ 500</div>
        </div>

        <div class="mix drink menu-item">
          <div class="img-circle"></div>
          <div class="item-info">
            <h2 class="item-name">cafe latte</h2>
            <p class="item-desc">まろやかなミルクとエスプレッソ。</p>
          </div>
          <div class="item-price">¥ 580</div>
        </div>

      </div>
    </section>

  </main>

  <footer class="footer">
    © soft café
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
